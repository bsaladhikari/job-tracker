<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Tracker</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #eef2f7, #d9e2ec);
      margin: 0;
      padding: 15px;
    }

    .app {
      max-width: 900px;
      margin: auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
      font-size: 24px;
    }

    .summary {
      text-align: center;
      font-size: 16px;
      margin-bottom: 10px;
      color: #555;
    }

    .total {
      font-size: 28px;
      font-weight: bold;
      color: #2c7be5;
    }

    #calendar {
      margin-top: 10px;
    }

    /* Toolbar */
    .fc .fc-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .fc .fc-toolbar-title {
      font-size: 18px;
      font-weight: 600;
    }

    .fc .fc-button {
      background: #f1f3f5;
      border: none;
      color: #333;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .fc .fc-button:hover {
      background: #e2e6ea;
    }

    .fc .fc-button:focus {
      box-shadow: none;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
      font-size: 13px;
      color: #555;
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .box {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .green { background: #28a745; }
    .orange { background: #f59f00; }

    @media (max-width: 600px) {
      .app { padding: 12px; }
      .fc .fc-toolbar-title { font-size: 16px; }
      .total { font-size: 24px; }
    }
  </style>
</head>

<body>

<div class="app">
  <h1>📅 Job Tracker</h1>

  <div class="summary">
    Total Worked: <span class="total" id="totalDays">0</span> days
  </div>

  <div id="calendar"></div>

  <div class="legend">
    <span><span class="box green"></span> Full Day</span>
    <span><span class="box orange"></span> Half Day</span>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const calendarEl = document.getElementById('calendar');
  const totalEl = document.getElementById('totalDays');

  let storedData = JSON.parse(localStorage.getItem('workDays')) || {};

  // 🧹 Keep only last 3 months
  const now = new Date();
  const currentMonth = now.getMonth();
  const currentYear = now.getFullYear();

  Object.keys(storedData).forEach(date => {
    const d = new Date(date);

    const monthDiff =
      (currentYear - d.getFullYear()) * 12 +
      (currentMonth - d.getMonth());

    if (monthDiff >= 3) {
      delete storedData[date];
    }
  });

  localStorage.setItem('workDays', JSON.stringify(storedData));

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',

    headerToolbar: {
      left: 'prev',
      center: 'title',
      right: 'next'
    },

    buttonText: {
      prev: '‹',
      next: '›'
    },

    dateClick: function(info) {
      const date = info.dateStr;

      let current = storedData[date];

      let next;
      if (!current) next = "full";
      else if (current === "full") next = "half";
      else next = null;

      if (next) {
        storedData[date] = next;
      } else {
        delete storedData[date];
      }

      localStorage.setItem('workDays', JSON.stringify(storedData));
      renderAll();
    }
  });

  function renderEvents() {
    calendar.removeAllEvents();

    Object.keys(storedData).forEach(date => {
      const type = storedData[date];

      calendar.addEvent({
        start: date,
        allDay: true,
        title: type === "full" ? "Full Day" : "Half Day",
        color: type === "full" ? "#28a745" : "#f59f00"
      });
    });
  }

  function calculateTotal() {
    let total = 0;

    Object.values(storedData).forEach(val => {
      if (val === "full") total += 1;
      if (val === "half") total += 0.5;
    });

    totalEl.textContent = total;
  }

  function renderAll() {
    renderEvents();
    calculateTotal();
  }

  calendar.render();
  renderAll();
});
</script>

</body>
</html>
